<!DOCTYPE html>
<html 
	xmlns:th="http://www.thymeleaf.org" 
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
	layout:decorate="~{template/client/layout}">
<head>
<meta charset="UTF-8">
<title>JOB</title>

<script th:src="@{/js/favorite.js}"></script>
	<style>
		
		.favoriteSpan {
			display: flex;
			align-items: center;
			justify-content: center;
			width: 40px;
			height: 40px;
			border: 1px solid #ccc;
			border-radius: 6px;
			background: #fff;
			cursor: pointer;
			transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
		}
		.favoriteSpan:hover {
			background: #f8f9fa;
			border-color: #999;
			box-shadow: 0 2px 6px rgba(0,0,0,0.08);
		}
		.favoriteSpan:hover {
			color: #ff9800; 
		}
		
		
		.post-buttons {
			position: relative;
			display: flex;
			justify-content: center;  
			align-items: center;
			margin-top: 16px;
			margin-bottom: 16px;
		}
		
		.post-buttons .board-btn {
			position: absolute;
			right: 0; 
		}
		.favorite{
			width: 100%;
		    height: 100%;
		    display: flex;
		    align-items: center;
		    justify-content: center;
		    color: #FFD43B;
		    cursor: pointer;
		    transition: color 0.2s;
		}
		.post-view-count{
			margin-left: 15px;
		}
		.post-info i{ font-size: 16px;}
		
		/* ====== 480px 이하 ====== */
		@media (max-width: 480px) {
			.post-title{ height: 20px; font-size: 13px;}
			.post-info {
			    & i, 
			    & #created_at, 
			    & #view_count,
			    & .post-view-count {
			        font-size: 12px;
			        color: #999;
			    }
			}
			#created_at{margin-left: 5px;}
			.post-view-count{ margin-left: 8px;}
			.post-header{margin: 0 10px;}
			#post-content> p{font-size: 13px;}
		}
		
	</style>
	<script th:inline="javascript">
		$(function(){
				
			let postId = /*[[${postId}]]*/ '';
			getBoard();
				
			function getBoard(){
				if(postId == "" || postId == null) alert("게시글을 불러올 수 없습니다. 잠시 후 다시 시도해주세요.");
				else{
					fetch('/api/jobs/post/' + postId)
			        .then(res => {
						if (!res.ok) {
							return res.json().then(err => {
					      		throw new Error(err.detail || "요청 처리 중 오류가 발생했습니다.");
					      	})
						}
						return res.json();
					})
			        .then(result => {
						const data = result.post;
						
			        	$("#title").text(data.title);
						
			        	$("#created_at").text(timeAgo(data.created_at));
			        	$("#view_count").text(data.view_count);
			        	
			        	$("#post-content").html(data.content);
				        	
			        	$("#post-city").text(data.city);
			        	$("#post-gu").text(data.gu);
			        	$("#post-dong").text(data.dong);
				        	
			        	$("#position").text(data.position);
			        	
			        	$(".favoriteSpan").attr("data-post-id", data.post_id);
			        	$(".favoriteSpan").attr("data-board-type", "JOB");
			    		
			    		let $icon = $(".favoriteSpan").find("i"); 
			    		data.favorite ? $icon.addClass("fa-solid")
			    					   : $icon.addClass("fa-regular");
				        
			        	if(data.category == 0){
			        		const payTexts = ["협의 후 결정", "건별 ","시급 ", "일급 ", "월급 ", "연봉 "];
							let pay_category = payTexts[data.pay_category] || "협의 후 결정";
							
			        		$("#pay_category").text(pay_category);
			        		$("#pay").text(data.pay_category > 0 ? formatNumberKo(data.pay) + "원" : "");
		
				        	$("#company-name").text(data.company_name);
			        	}else {
							$(".pay-div").css("display", "none");
							$(".userName").text(data.user_name + "님");
			        	}

						$("#btn-go-list").attr("data-link", '/jobs/board?category=' + data.category);
			        	$("#apply").attr("data-category", data.category);
			        	
			        	if(data.status == 1){
			        		$("#status").css("display","block");
			        		$("#status").text("구인 완료된 글 입니다.");
			        		$(".post-actions").remove();
			        	}
			        	
			        	if (result.isAuthor === true) {
			        		$(".post-actions").remove();
			        	}
		
			        })
			    	.catch(err => {
			    	 	alert(err.message);
			    	});
				}
			}
			
			$("#apply").click(function(){
				var category = $(this).attr("data-category");
						
				var url = "/jobs/applyForm/" + postId + "?category="+category;
			    var option = "width=500, height=610, top=10, left=10";
			    var name = "applyPopup";
			    window.open(url, name, option);
			})
			
			$("#btn-go-list").click(function(){
				var link = $(this).attr("data-link");
				location.href= link;
			})
		})
		
		function formatNumberKo(pay) {
			const num = Number(String(pay).replace(/[^\d]/g, ''));
			return num ? num.toLocaleString('ko-KR') : '';
		}
	</script>
</head>
<body class="wrap">
	<div layout:fragment="body">
		<div class="contents">
			<input type="hidden" id="postId" name="postId" th:value="${postId}"/>
			
			<div class="board-detail-container">
			    <!-- 제목 & 작성자 정보 -->
			    <div class="post-header">
			        <p id="title" class="post-title"></p>
			        <div class="post-info">
			        	<i class="fa-solid fa-clock"></i>
			        	<span id="created_at"></span>
			        	
			            <span class="post-view-count">
			            	<i class="fa-solid fa-eye"></i>
			                <span id="view_count"></span>
			            </span>
			        </div>
			    </div>
			
			    <!-- 기본 정보 영역 -->
			    <div class="job-meta-box">
			    	<div class="job-meta-row">
			    		<div class="job-meta-label"></div>
			    		<div class="job-meta-value">
			    			<span id="company-name" class="company-name"></span>
			    			<span id="user-name" class="userName"></span>
			    		</div>
			    	</div>
			        <div class="job-meta-row">
			            <div class="job-meta-label">지역</div>
			            <div class="job-meta-value">
			                <span id="post-city"></span> 
			                <span id="post-gu"></span> 
			                <span id="post-dong"></span>
			            </div>
			        </div>
			        <div class="job-meta-row pay-div">
			            <div class="job-meta-label">급여</div>
			            <div class="job-meta-value">
			                <span id="pay_category"></span> 
			                <span id="pay"></span>
			            </div>
			        </div>
			        <div class="job-meta-row">
			        	<div class="job-meta-label">포지션</div>
			        	<div class="job-meta-value">
			        		<span id="position"></span>
			        	</div>
			        </div>
			    </div>
			
			    <!-- 모집 완료 표시 -->
			    <div class="job-status" id="status" style="display: none;"></div>
			
			    <!-- 본문 영역 -->
			    <div class="content-div">
			        <p id="post-content"></p>
			    </div>
			
			    <!-- 버튼 영역 -->
			    <div class="post-buttons">
			    	<div sec:authorize="isAuthenticated() and !hasRole('COMPANY')" class="post-actions">
			    		<button id="apply">지원하기</button>
		    			<span class="favoriteSpan">
		    				<i class="favorite fa-star"></i>
						</span>
			    	</div>
			    	<a id="btn-go-list" class="board-btn">목록</a>
			    </div>
			</div>
		</div>
	</div>
</body>
</html>
