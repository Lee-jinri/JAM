name: Deploy to EC2

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout source
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'corretto'
        java-version: '17'

    - name: Build with Maven
      run: mvn -B package -Dmaven.test.skip=true
      working-directory: ./

    - name: List JAR files
      run: ls -lh ./target

    - name: Debug JAR path
      run: |
        echo "SEARCHING:"
        find -name "*.jar" -type f

    - name: Copy JAR file with native scp
      env:
        EC2_KEY: ${{ secrets.EC2_KEY }}
      run: |
        echo "$EC2_KEY" > /tmp/ec2_key.pem
        chmod 400 /tmp/ec2_key.pem
    
        JAR_FILE=$(find "./target" -name "*.jar" -type f | head -n 1)
        if [ -z "$JAR_FILE" ]; then
          echo "ERROR: JAR 파일을 찾을 수 없습니다"
          exit 1
        fi
    
        echo "배포할 JAR 파일: $JAR_FILE"
        ls -lh "$JAR_FILE"

        scp -v -o StrictHostKeyChecking=no -i /tmp/ec2_key.pem \
          "$JAR_FILE" \
          ec2-user@${{ secrets.EC2_HOST }}:/home/ec2-user/app.jar
    
        rm -f /tmp/ec2_key.pem
    
    - name: Restart Application on EC2
      uses: appleboy/ssh-action@v0.1.8
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.EC2_KEY }}
        script: |           
          
          echo "애플리케이션 재시작..."
          sudo systemctl restart myapp

          echo "배포 완료. 5초 후 로그 확인 시작..."
          sleep 5
          sudo journalctl -u myapp -n 50
